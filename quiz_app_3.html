<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>自衛隊試験 模擬問題</title>
<style>
  :root {
    --navy: #0a1628;
    --navy2: #112240;
    --blue: #1a3a6b;
    --accent: #c9a227;
    --accent2: #e8c547;
    --light: #e8f0fe;
    --white: #ffffff;
    --gray: #8899aa;
    --correct: #2ecc71;
    --wrong: #e74c3c;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, var(--navy2) 0%, var(--blue) 100%);
    padding: 16px 20px 12px;
    border-bottom: 2px solid var(--accent);
    position: sticky; top: 0; z-index: 100;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 18px; font-weight: 700; letter-spacing: 1px; color: var(--accent); }
  .badge {
    background: var(--accent); color: var(--navy);
    font-size: 13px; font-weight: 700;
    padding: 4px 11px; border-radius: 20px;
  }
  .progress-bar-wrap { margin-top: 10px; background: rgba(255,255,255,0.1); border-radius: 99px; height: 6px; }
  .progress-bar { height: 6px; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .4s; }
  .stats { display: flex; gap: 16px; margin-top: 8px; }
  .stat { font-size: 14px; color: var(--gray); }
  .stat span { color: var(--white); font-weight: 600; }

  /* ── SCREENS ── */
  .screen { display: none; padding: 20px 16px 120px; }
  .screen.active { display: block; }

  /* ── HOME ── */
  .home-hero {
    text-align: center;
    padding: 40px 20px 30px;
  }
  .emblem { font-size: 64px; margin-bottom: 12px; }
  .home-hero h2 { font-size: 26px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .home-hero p { font-size: 16px; color: var(--gray); line-height: 1.7; }
  .categories {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 24px 0;
  }
  .cat-btn {
    background: var(--navy2); border: 1px solid rgba(201,162,39,0.3);
    border-radius: var(--radius); padding: 14px 10px;
    text-align: center; cursor: pointer;
    transition: all .2s; color: var(--white);
  }
  .cat-btn:active { transform: scale(0.96); background: var(--blue); }
  .cat-btn.selected { border-color: var(--accent); background: rgba(201,162,39,0.15); }
  .cat-icon { font-size: 26px; margin-bottom: 5px; }
  .cat-name { font-size: 13px; font-weight: 600; line-height: 1.3; }
  .cat-count { font-size: 12px; color: var(--gray); margin-top: 2px; }
  .start-btn {
    width: 100%; padding: 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: var(--navy); font-size: 16px; font-weight: 800;
    border: none; border-radius: var(--radius); cursor: pointer;
    letter-spacing: 2px;
    box-shadow: 0 6px 24px rgba(201,162,39,0.4);
    transition: all .2s;
  }
  .start-btn:active { transform: scale(0.97); }
  .mode-select { display: flex; gap: 8px; margin: 16px 0; }
  .mode-btn {
    flex: 1; padding: 12px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: var(--navy2); color: var(--gray);
    font-size: 14px; cursor: pointer; transition: all .2s;
  }
  .mode-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(201,162,39,0.1); }

  /* ── QUESTION ── */
  .q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .q-num { font-size: 15px; color: var(--gray); }
  .q-cat-tag {
    font-size: 13px; padding: 5px 12px;
    background: rgba(201,162,39,0.15); color: var(--accent);
    border-radius: 20px; border: 1px solid rgba(201,162,39,0.3);
  }
  .q-card {
    background: var(--navy2);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius); padding: 20px;
    margin-bottom: 16px;
  }
  .q-type { font-size: 13px; color: var(--accent); margin-bottom: 10px; letter-spacing: 1px; font-weight: 600; }
  .q-text { font-size: 17px; line-height: 2.0; font-weight: 500; }
  .q-sub {
    margin-top: 14px; padding: 14px;
    background: rgba(255,255,255,0.04);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 16px; line-height: 2.0; color: var(--light);
  }
  .choices { display: flex; flex-direction: column; gap: 12px; }
  .choice {
    background: var(--navy2); border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: var(--radius); padding: 16px 18px;
    display: flex; align-items: flex-start; gap: 14px;
    cursor: pointer; transition: all .2s;
  }
  .choice:active { transform: scale(0.98); }
  .choice.selected { border-color: var(--accent); background: rgba(201,162,39,0.1); }
  .choice.correct { border-color: var(--correct); background: rgba(46,204,113,0.12); }
  .choice.wrong { border-color: var(--wrong); background: rgba(231,76,60,0.12); }
  .choice-num {
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; flex-shrink: 0;
    color: var(--gray);
  }
  .choice.selected .choice-num { background: var(--accent); color: var(--navy); }
  .choice.correct .choice-num { background: var(--correct); color: white; }
  .choice.wrong .choice-num { background: var(--wrong); color: white; }
  .choice-text { font-size: 16px; line-height: 1.9; padding-top: 4px; }

  /* ── EXPLANATION ── */
  .explanation {
    display: none;
    margin-top: 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius); padding: 14px;
  }
  .explanation.show { display: block; }
  .exp-label { font-size: 13px; color: var(--accent); font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; }
  .exp-text { font-size: 15px; line-height: 1.9; color: var(--light); }

  /* ── BOTTOM BUTTONS ── */
  .btn-area {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 16px 28px;
    background: linear-gradient(to top, var(--navy) 80%, transparent);
    display: flex; gap: 10px;
  }
  .btn-next {
    flex: 1; padding: 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: var(--navy); font-size: 17px; font-weight: 800;
    border: none; border-radius: var(--radius); cursor: pointer;
    letter-spacing: 1px; transition: all .2s;
  }
  .btn-next:disabled { opacity: 0.4; }
  .btn-next:active:not(:disabled) { transform: scale(0.97); }
  .btn-quit {
    padding: 18px 16px;
    background: transparent;
    color: #e74c3c; font-size: 15px; font-weight: 700;
    border: 1px solid rgba(231,76,60,0.4); border-radius: var(--radius);
    cursor: pointer;
  }
  .btn-skip {
    padding: 18px 22px;
    background: transparent;
    color: var(--gray); font-size: 15px;
    border: 1px solid rgba(255,255,255,0.15); border-radius: var(--radius);
    cursor: pointer;
  }

  /* ── RESULT ── */
  .result-circle {
    width: 150px; height: 150px; border-radius: 50%;
    border: 5px solid var(--accent);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin: 30px auto;
    background: var(--navy2);
    box-shadow: 0 0 40px rgba(201,162,39,0.3);
  }
  .result-score { font-size: 46px; font-weight: 900; color: var(--accent); }
  .result-total { font-size: 15px; color: var(--gray); }
  .result-msg { text-align: center; font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .result-sub { text-align: center; font-size: 15px; color: var(--gray); margin-bottom: 24px; }
  .result-cats { background: var(--navy2); border-radius: var(--radius); padding: 16px; margin-bottom: 20px; }
  .result-cat-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .result-cat-row:last-child { border-bottom: none; }
  .result-cat-name { font-size: 14px; }
  .result-cat-bar-wrap { flex: 1; margin: 0 12px; height: 5px; background: rgba(255,255,255,0.1); border-radius: 99px; }
  .result-cat-bar { height: 5px; border-radius: 99px; background: var(--accent); }
  .result-cat-pct { font-size: 13px; color: var(--gray); min-width: 36px; text-align: right; }
  .restart-btn {
    width: 100%; padding: 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: var(--navy); font-size: 17px; font-weight: 800;
    border: none; border-radius: var(--radius); cursor: pointer;
    margin-bottom: 12px;
  }
  .back-btn {
    width: 100%; padding: 16px;
    background: transparent; color: var(--gray);
    font-size: 16px; border: 1px solid rgba(255,255,255,0.15);
    border-radius: var(--radius); cursor: pointer;
  }

  /* ── REVIEW ── */
  .review-item {
    background: var(--navy2); border-radius: var(--radius);
    padding: 16px; margin-bottom: 12px;
    border-left: 4px solid;
  }
  .review-item.ok { border-color: var(--correct); }
  .review-item.ng { border-color: var(--wrong); }
  .review-qnum { font-size: 12px; color: var(--gray); margin-bottom: 6px; }
  .review-qtext { font-size: 14px; line-height: 1.7; margin-bottom: 8px; }
  .review-ans { font-size: 13px; }
  .review-ans .your { color: var(--wrong); }
  .review-ans .correct-ans { color: var(--correct); }
    background: var(--navy2); border-radius: var(--radius);
    padding: 14px; margin-bottom: 12px;
    border-left: 4px solid;
  }
  .review-item.ok { border-color: var(--correct); }
  .review-item.ng { border-color: var(--wrong); }
  .review-qnum { font-size: 10px; color: var(--gray); margin-bottom: 4px; }
  .review-qtext { font-size: 12px; line-height: 1.6; margin-bottom: 6px; }
  .review-ans { font-size: 11px; }
  .review-ans .your { color: var(--wrong); }
  .review-ans .correct-ans { color: var(--correct); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <h1>🛡 自衛隊 模擬試験</h1>
    <span class="badge" id="headerBadge">80問</span>
  </div>
  <div class="progress-bar-wrap" id="progressWrap" style="display:none">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <div class="stats" id="statsArea" style="display:none">
    <div class="stat">問題 <span id="statQ">0</span></div>
    <div class="stat">正解 <span id="statC" style="color:var(--correct)">0</span></div>
    <div class="stat">不正解 <span id="statW" style="color:var(--wrong)">0</span></div>
  </div>
</div>

<!-- HOME -->
<div class="screen active" id="screenHome">
  <div class="home-hero">
    <div class="emblem">✈️</div>
    <h2>航空自衛隊<br>模擬試験アプリ</h2>
    <p>試験範囲から出題される<br>4択模擬問題で実力を確認しよう</p>
  </div>

  <div style="margin-bottom:12px; font-size:12px; color:var(--gray); font-weight:600; letter-spacing:1px;">出題モード</div>
  <div class="mode-select">
    <button class="mode-btn selected" id="modeAll" onclick="setMode('all')">全問題</button>
    <button class="mode-btn" id="modeRand" onclick="setMode('random')">ランダム30問</button>
    <button class="mode-btn" id="modeWeak" onclick="setMode('weak')">苦手問題</button>
  </div>

  <div style="margin: 16px 0 8px; font-size:12px; color:var(--gray); font-weight:600; letter-spacing:1px;">カテゴリ選択</div>
  <div class="categories" id="catGrid"></div>

  <button class="start-btn" onclick="startQuiz()">試験開始 ▶</button>
</div>

<!-- QUESTION -->
<div class="screen" id="screenQ">
  <div class="q-meta">
    <span class="q-num" id="qNum">第1問</span>
    <span class="q-cat-tag" id="qCatTag"></span>
  </div>
  <div class="q-card">
    <div class="q-type" id="qType"></div>
    <div class="q-text" id="qText"></div>
    <div class="q-sub" id="qSub" style="display:none"></div>
  </div>
  <div class="choices" id="choicesArea"></div>
  <div class="explanation" id="explanation">
    <div class="exp-label">解説</div>
    <div class="exp-text" id="expText"></div>
  </div>
  <div class="btn-area">
    <button class="btn-quit" onclick="confirmQuit()">中断</button>
    <button class="btn-skip" onclick="skipQ()">スキップ</button>
    <button class="btn-next" id="btnNext" onclick="nextQ()" disabled>次の問題 →</button>
  </div>

  <!-- 中断確認ダイアログ -->
  <div id="quitOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; align-items:center; justify-content:center;">
    <div style="background:var(--navy2); border:1px solid var(--accent); border-radius:14px; padding:28px 24px; margin:20px; text-align:center;">
      <div style="font-size:18px; font-weight:700; margin-bottom:10px;">試験を中断しますか？</div>
      <div style="font-size:14px; color:var(--gray); margin-bottom:24px;">途中までの結果は表示されます。</div>
      <div style="display:flex; gap:12px;">
        <button onclick="cancelQuit()" style="flex:1; padding:14px; border-radius:14px; border:1px solid rgba(255,255,255,0.2); background:transparent; color:white; font-size:15px; cursor:pointer;">続ける</button>
        <button onclick="doQuit()" style="flex:1; padding:14px; border-radius:14px; border:none; background:#e74c3c; color:white; font-size:15px; font-weight:700; cursor:pointer;">中断する</button>
      </div>
    </div>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="screenResult">
  <div class="result-circle">
    <div class="result-score" id="resScore">0</div>
    <div class="result-total" id="resTotal">/ 0問</div>
  </div>
  <div class="result-msg" id="resMsg"></div>
  <div class="result-sub" id="resSub"></div>
  <div class="result-cats" id="resCats"></div>
  <button class="restart-btn" onclick="restartSame()">もう一度挑戦</button>
  <button class="back-btn" onclick="goHome()">← ホームに戻る</button>
  <div style="height:20px"></div>
  <div style="font-size:12px; color:var(--gray); margin-bottom:10px; font-weight:600;">間違えた問題</div>
  <div id="reviewArea"></div>
</div>

<script>
// ===========================
// QUESTION BANK
// ===========================
const CATS = [
  { id:'law',     name:'自衛隊法',       icon:'⚖️',  desc:'防衛出動・治安出動等' },
  { id:'rei',     name:'礼式・敬礼',     icon:'🎖️',  desc:'敬礼・旗・防衛記念章' },
  { id:'himitsu', name:'特定秘密',       icon:'🔐',  desc:'特定秘密の保護' },
  { id:'bunsho',  name:'行政文書',       icon:'📄',  desc:'文書管理・倫理規定' },
  { id:'fuku',    name:'服装',           icon:'👔',  desc:'航空自衛官服装細則' },
  { id:'kyoka',   name:'休暇制度',       icon:'🌿',  desc:'各種休暇・産前産後' },
  { id:'comp',    name:'コンプライアンス',icon:'🧭', desc:'セクハラ・倫理・事故' },
  { id:'taiiku',  name:'体育・行進・銃', icon:'🏃',  desc:'体育訓練・銃操作・行進' },
  { id:'anzen',   name:'安全管理',       icon:'🚨',  desc:'安全色彩・安全標識' },
  { id:'kyoiku',  name:'教育訓練',       icon:'📚',  desc:'訓練の区分・部隊訓練' },
  { id:'kichi',   name:'基地服務',       icon:'🏢',  desc:'消防・災害・当直' },
  { id:'keiki',   name:'経歴管理',       icon:'📋',  desc:'経歴管理・段階区分' },
  { id:'joho',    name:'情報保証',       icon:'💻',  desc:'情報保証・脆弱性対応' },
  { id:'ryakugo', name:'防衛略語',       icon:'🔤',  desc:'防衛関連略語' },
];

const ALL_Q = [

// ====== 自衛隊法 ======
{id:1,cat:'law',type:'正誤の組合せを選べ',
 text:'防衛出動（自衛隊法第76条）について、次のA・Bの正誤の組合せとして、正しいものを選べ。

A：内閣総理大臣は、武力攻撃事態等及び存立危機事態において、国会の承認を得なければならない。
B：内閣総理大臣は、出動の必要がなくなったときは、直ちに自衛隊の撤収を命じなければならない。',
 choices:['A：正　B：正','A：正　B：誤','A：誤　B：正','A：誤　B：誤'],
 answer:0,

{id:2,cat:'law',type:'（　）に入る語句として、正しいものを選べ',

「内閣総理大臣は、出動を命じた日から（　）日以内に国会に付議して、その承認を求めなければならない。」',

{id:3,cat:'law',type:'誤りを選べ',

{id:6,cat:'law',type:'正誤の組合せを選べ',

// ===========================
// APP STATE
// ===========================
let mode = 'all';
let selectedCats = new Set(CATS.map(c=>c.id));
let currentIdx = 0;
let questions = [];
let answers = []; // {qid, chosen, correct}
let weakSet = new Set(JSON.parse(localStorage.getItem('weakQ')||'[]'));

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('mode'+m.charAt(0).toUpperCase()+m.slice(1)).classList.add('selected');
  updateHeader();
}

function toggleCat(id) {
  if(selectedCats.has(id)) {
    if(selectedCats.size>1) selectedCats.delete(id);
  } else {
    selectedCats.add(id);
  }
  renderCats();
}

function renderCats() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  CATS.forEach(c=>{
    const count = ALL_Q.filter(q=>q.cat===c.id).length;
    const btn = document.createElement('div');
    btn.className = 'cat-btn' + (selectedCats.has(c.id)?' selected':'');
    btn.innerHTML = `<div class="cat-icon">${c.icon}</div><div class="cat-name">${c.name}</div><div class="cat-count">${count}問</div>`;
    btn.onclick = ()=>toggleCat(c.id);
    grid.appendChild(btn);
  });
}

function updateHeader() {
  let pool = getPool();
  document.getElementById('headerBadge').textContent = pool.length+'問';
}

function getPool() {
  let pool = ALL_Q.filter(q=>selectedCats.has(q.cat));
  if(mode==='weak') {
    let w = pool.filter(q=>weakSet.has(q.id));
    if(w.length>0) pool=w;
  }
  return pool;
}

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function startQuiz() {
  let pool = getPool();
  if(mode==='random') {
    pool = shuffle([...pool]).slice(0,Math.min(30,pool.length));
  } else {
    pool = shuffle([...pool]);
  }
  questions = pool;
  answers = [];
  currentIdx = 0;
  showScreen('screenQ');
  document.getElementById('progressWrap').style.display='block';
  document.getElementById('statsArea').style.display='flex';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentIdx];
  const total = questions.length;

  // Progress
  document.getElementById('progressBar').style.width = (currentIdx/total*100)+'%';
  document.getElementById('statQ').textContent = currentIdx+'/'+total;
  document.getElementById('statC').textContent = answers.filter(a=>a.chosen===a.correct).length;
  document.getElementById('statW').textContent = answers.filter(a=>a.chosen!==a.correct&&a.chosen!==-1).length;

  // Q meta
  document.getElementById('qNum').textContent = '第'+(currentIdx+1)+'問';
  document.getElementById('qCatTag').textContent = CATS.find(c=>c.id===q.cat)?.name||'';
  document.getElementById('qType').textContent = '【'+q.type+'】';

  // Text
  const parts = q.text.split('\n');
  document.getElementById('qText').textContent = parts[0];
  const sub = document.getElementById('qSub');
  if(parts.length>1) {
    sub.textContent = parts.slice(1).join('\n');
    sub.style.display='block';
  } else {
    sub.style.display='none';
  }

  // Choices — shuffle order but keep correct
  const origChoices = q.choices.map((c,i)=>({text:c,origIdx:i}));
  const shuffled = shuffle([...origChoices]);
  const newCorrect = shuffled.findIndex(c=>c.origIdx===q.answer);

  document.getElementById('choicesArea').innerHTML='';
  shuffled.forEach((c,i)=>{
    const div=document.createElement('div');
    div.className='choice';
    div.innerHTML=`<div class="choice-num">${i+1}</div><div class="choice-text">${c.text}</div>`;
    div.onclick=()=>selectChoice(div, i, newCorrect, q);
    document.getElementById('choicesArea').appendChild(div);
  });

  // Store shuffled answer index for this question
  q._shuffledAnswer = newCorrect;

  document.getElementById('explanation').classList.remove('show');
  document.getElementById('expText').textContent = q.exp||'';
  document.getElementById('btnNext').disabled=true;
}

function selectChoice(div, idx, correct, q) {
  if(document.getElementById('btnNext').disabled===false) return;
  const choices = document.querySelectorAll('.choice');
  choices.forEach(c=>c.style.pointerEvents='none');

  div.classList.add(idx===correct?'correct':'wrong');
  if(idx!==correct) {
    choices[correct].classList.add('correct');
  }
  document.getElementById('explanation').classList.add('show');
  document.getElementById('btnNext').disabled=false;

  // Update choice-num for visual
  choices.forEach((c,i)=>{
    if(i===correct) c.querySelector('.choice-num').textContent='✓';
    else if(i===idx && idx!==correct) c.querySelector('.choice-num').textContent='✗';
  });

  answers.push({qid:q.id, chosen:idx, correct:correct});
  if(idx!==correct) weakSet.add(q.id);
  else weakSet.delete(q.id);
  localStorage.setItem('weakQ', JSON.stringify([...weakSet]));

  document.getElementById('statC').textContent = answers.filter(a=>a.chosen===a.correct).length;
  document.getElementById('statW').textContent = answers.filter(a=>a.chosen!==a.correct&&a.chosen!==-1).length;
}

function nextQ() {
  currentIdx++;
  if(currentIdx>=questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function skipQ() {
  answers.push({qid:questions[currentIdx].id, chosen:-1, correct:questions[currentIdx]._shuffledAnswer||0});
  currentIdx++;
  if(currentIdx>=questions.length) showResult();
  else renderQuestion();
}

function showResult() {
  showScreen('screenResult');
  document.getElementById('progressWrap').style.display='none';
  document.getElementById('statsArea').style.display='none';

  const correct = answers.filter(a=>a.chosen===a.correct).length;
  const total = questions.length;
  const pct = Math.round(correct/total*100);

  document.getElementById('resScore').textContent = correct;
  document.getElementById('resTotal').textContent = '/ '+total+'問';

  let msg, sub;
  if(pct>=90){msg='優秀！🏆';sub='素晴らしい成績です。引き続き維持しましょう。'}
  else if(pct>=70){msg='合格圏内！👍';sub='あと一歩で高得点。苦手分野を復習しましょう。'}
  else if(pct>=50){msg='もう少し！📚';sub='基礎をしっかり固めましょう。'}
  else{msg='要復習⚡';sub='もう一度試験範囲を確認しましょう。'}
  document.getElementById('resMsg').textContent = msg+' '+pct+'%';
  document.getElementById('resSub').textContent = sub;

  // By category
  const cats = document.getElementById('resCats');
  cats.innerHTML = '<div style="font-size:12px;color:var(--gray);font-weight:600;margin-bottom:10px;letter-spacing:1px;">カテゴリ別成績</div>';
  CATS.forEach(c=>{
    const qs = questions.filter(q=>q.cat===c.id);
    if(!qs.length) return;
    const cAns = answers.filter(a=>qs.some(q=>q.id===a.qid)&&a.chosen===a.correct).length;
    const p = Math.round(cAns/qs.length*100);
    const row=document.createElement('div'); row.className='result-cat-row';
    row.innerHTML=`<div class="result-cat-name">${c.icon} ${c.name}</div>
      <div class="result-cat-bar-wrap"><div class="result-cat-bar" style="width:${p}%"></div></div>
      <div class="result-cat-pct">${cAns}/${qs.length}</div>`;
    cats.appendChild(row);
  });

  // Review wrong
  const rev = document.getElementById('reviewArea');
  rev.innerHTML='';
  const wrong = answers.filter(a=>a.chosen!==a.correct);
  wrong.forEach(a=>{
    const q = questions.find(qq=>qq.id===a.qid);
    if(!q) return;
    const origChoices = q.choices.map((c,i)=>({text:c,origIdx:i}));
    const item=document.createElement('div');
    item.className='review-item ng';
    item.innerHTML=`<div class="review-qnum">${CATS.find(c=>c.id===q.cat)?.name||''}</div>
      <div class="review-qtext">${q.text.split('\n')[0]}</div>
      <div class="review-ans"><span class="correct-ans">正解：${q.choices[q.answer]}</span></div>`;
    rev.appendChild(item);
  });
  if(!wrong.length) rev.innerHTML='<div style="text-align:center;color:var(--correct);padding:20px;font-size:14px;">全問正解！🎉</div>';
}

function restartSame() {
  currentIdx=0; answers=[];
  questions = shuffle([...questions]);
  showScreen('screenQ');
  document.getElementById('progressWrap').style.display='block';
  document.getElementById('statsArea').style.display='flex';
  renderQuestion();
}

function confirmQuit() {
  const overlay = document.getElementById('quitOverlay');
  overlay.style.display = 'flex';
}

function cancelQuit() {
  const overlay = document.getElementById('quitOverlay');
  overlay.style.display = 'none';
}

function doQuit() {
  document.getElementById('quitOverlay').style.display = 'none';
  showResult();
}

function goHome() {
  showScreen('screenHome');
  document.getElementById('progressWrap').style.display='none';
  document.getElementById('statsArea').style.display='none';
  updateHeader();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// Init
renderCats();
updateHeader();
</script>
